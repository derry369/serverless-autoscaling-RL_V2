apiVersion: v1
kind: Service
metadata:
  name: light-api-metrics
  namespace: default
  labels:
    app: light-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    serving.knative.dev/service: light-api
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080