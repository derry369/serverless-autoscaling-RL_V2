apiVersion: v1
kind: Service
metadata:
  name: long-task-metrics
  namespace: default
  labels:
    app: long-task
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    serving.knative.dev/service: long-task
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080